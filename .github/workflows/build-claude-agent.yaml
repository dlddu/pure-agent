name: Build Claude Agent Image

on:
  push:
    branches: [main]
    paths:
      - "claude-agent/**"
      - ".github/workflows/build-claude-agent.yaml"
  pull_request:
    branches: [main]
    paths:
      - "claude-agent/**"
      - ".github/workflows/build-claude-agent.yaml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-image.yaml
    with:
      service: claude-agent
