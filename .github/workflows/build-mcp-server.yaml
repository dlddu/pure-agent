name: Build MCP Server

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/build-mcp-server.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/build-mcp-server.yaml"
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/_build-image.yaml
    with:
      service: mcp-server
