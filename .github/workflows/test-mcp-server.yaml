name: Test MCP Server

on:
  push:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/test-mcp-server.yaml"
  pull_request:
    branches: [main]
    paths:
      - "mcp-server/**"
      - ".github/workflows/test-mcp-server.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mcp-server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: mcp-server/package-lock.json

      - run: npm ci
      - run: npm run typecheck
      - run: npm test
