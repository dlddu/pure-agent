name: Test Router

on:
  push:
    branches: [main]
    paths:
      - "router/**"
      - ".github/workflows/test-router.yaml"
  pull_request:
    branches: [main]
    paths:
      - "router/**"
      - ".github/workflows/test-router.yaml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: router

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements-dev.txt

      - run: python -m pytest test_router.py -v
