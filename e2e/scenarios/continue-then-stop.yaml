name: continue-then-stop
level: [2]
cycles:
  - export_config:
      linear_issue_id: "mock-issue-id"
      actions:
        - "continue"
      session_id: "mock-session-0"
    agent_result: "Cycle 0 done, continuing..."
  - export_config:
      linear_issue_id: "mock-issue-id"
      actions:
        - "none"
      session_id: "mock-session-1"
    agent_result: "Cycle 1 done, stopping."
assertions:
  gate_decisions:
    - "continue"
    - "stop"
