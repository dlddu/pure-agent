name: planner-infra-env
description: "Planner가 infra 환경을 선택하는 시나리오"
level: [1, 2, 3]
max_depth: 1

# ── Level 2: mock cycle 정의 ──
cycles:
  - environment_id: "infra"
    export_config:
      linear_issue_id: "mock-issue-id"
      summary: "Infrastructure deployment completed."
      actions:
        - "none"
      session_id: "mock-session-infra"
    agent_result: "Kubernetes deployment completed."

# ── Level 3: real API 실행 설정 ──
real:
  max_depth: 5
  prompt: "Kubernetes 클러스터에 nginx deployment를 생성하고 replicas를 3으로 설정해주세요. kubectl과 helm 등 인프라 도구를 사용해야 합니다."
  setup: []
  verify: [planner_exact_image, s3_transcript, s3_planner_transcript]
  teardown: []

# ── 공유 assertions ──
assertions:
  planner_image: "infra"
  gate_decision: "stop"
  export_handler_exit: 0
