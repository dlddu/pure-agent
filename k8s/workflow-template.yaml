apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pure-agent
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa

  arguments:
    parameters:
      - name: max_depth
        value: "10"
      - name: prompt
        value: ""

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: efs
        resources:
          requests:
            storage: 10Gi

  outputs:
    parameters:
      - name: cycle_output
        valueFrom:
          parameter: "{{tasks.export-cycle-output.outputs.parameters.cycle_output}}"

  templates:

    # =============================
    # Main DAG
    # =============================
    - name: main
      dag:
        tasks:
          - name: mcp-daemon
            template: mcp-daemon

          - name: llm-gateway-daemon
            template: llm-gateway-daemon

          - name: run-cycle
            template: run-cycle
            dependencies: [mcp-daemon, llm-gateway-daemon]
            continueOn:
              failed: true
            arguments:
              parameters:
                - name: depth
                  value: "0"
                - name: max_depth
                  value: "{{workflow.parameters.max_depth}}"
                - name: prompt
                  value: "{{workflow.parameters.prompt}}"
                - name: previous_output
                  value: ""
                - name: mcp_host
                  value: "{{tasks.mcp-daemon.ip}}"
                - name: llm_gateway_host
                  value: "{{tasks.llm-gateway-daemon.ip}}"

          - name: export-cycle-output
            template: export-cycle-output
            dependencies: [run-cycle]
            continueOn:
              failed: true

          - name: cleanup
            template: cleanup-job
            dependencies: [export-cycle-output]

    # =============================
    # MCP Server Daemon
    # =============================
    - name: mcp-daemon
      daemon: true
      metadata:
        labels:
          pure-agent/role: mcp-server
      container:
        image: ghcr.io/dlddu/pure-agent/mcp-server:latest
        command: ["node", "build/index.js"]
        ports:
          - containerPort: 8080
        env:
          - name: LINEAR_API_KEY
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: LINEAR_API_KEY
          - name: LINEAR_TEAM_ID
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: LINEAR_TEAM_ID
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # LLM Gateway Daemon
    # =============================
    - name: llm-gateway-daemon
      daemon: true
      metadata:
        labels:
          pure-agent/role: llm-gateway
      volumes:
        - name: llm-gateway-config
          configMap:
            name: llm-gateway-config
      container:
        image: nginx:alpine
        ports:
          - containerPort: 80
            name: http
            protocol: TCP
        volumeMounts:
          - name: llm-gateway-config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
            readOnly: true
        livenessProbe:
          tcpSocket:
            port: 80
          periodSeconds: 10
          failureThreshold: 3

    # =============================
    # agent -> router loop
    # =============================
    - name: run-cycle
      inputs:
        parameters:
          - name: depth
          - name: max_depth
          - name: prompt
          - name: previous_output
          - name: mcp_host
          - name: llm_gateway_host
      steps:
        - - name: agent
            template: agent-job
            arguments:
              parameters:
                - name: prompt
                  value: "{{inputs.parameters.prompt}}"
                - name: previous_output
                  value: "{{inputs.parameters.previous_output}}"
                - name: llm_gateway_host
                  value: "{{inputs.parameters.llm_gateway_host}}"
                - name: mcp_host
                  value: "{{inputs.parameters.mcp_host}}"
        - - name: router
            template: router
            arguments:
              parameters:
                - name: depth
                  value: "{{inputs.parameters.depth}}"
                - name: max_depth
                  value: "{{inputs.parameters.max_depth}}"
        - - name: recurse
            template: run-cycle
            when: "{{steps.router.outputs.parameters.continue}} == true && {{=asInt(inputs.parameters.depth)+1}} < {{=asInt(inputs.parameters.max_depth)}}"
            arguments:
              parameters:
                - name: depth
                  value: "{{=asInt(inputs.parameters.depth)+1}}"
                - name: max_depth
                  value: "{{inputs.parameters.max_depth}}"
                - name: prompt
                  value: "{{inputs.parameters.prompt}}"
                - name: previous_output
                  value: "{{steps.agent.outputs.parameters.result}}"
                - name: mcp_host
                  value: "{{inputs.parameters.mcp_host}}"
                - name: llm_gateway_host
                  value: "{{inputs.parameters.llm_gateway_host}}"

    - name: agent-job
      metadata:
        labels:
          pure-agent/role: agent
      inputs:
        parameters:
          - name: prompt
          - name: previous_output
          - name: llm_gateway_host
          - name: mcp_host
      outputs:
        parameters:
          - name: result
            valueFrom:
              path: /tmp/agent_output.json
      nodeSelector:
        node.kubernetes.io/lifecycle: on-demand
      tolerations:
        - key: "lifecycle"
          operator: "Equal"
          value: "on-demand"
          effect: "NoSchedule"
      container:
        image: ghcr.io/dlddu/pure-agent/claude-agent:latest
        resources:
          requests:
            memory: 900Mi
          limits:
            memory: 900Mi
        command: ["/bin/sh", "-c"]
        args:
          - |
            cd /work
            cat > .mcp.json << MCPEOF
            {
              "mcpServers": {
                "pure-agent": {
                  "type": "http",
                  "url": "http://{{inputs.parameters.mcp_host}}:8080/mcp"
                }
              }
            }
            MCPEOF
            if [ -n "{{inputs.parameters.previous_output}}" ]; then
              FULL_PROMPT="Previous output:
            {{inputs.parameters.previous_output}}

            Continue with:
            {{inputs.parameters.prompt}}"
            else
              FULL_PROMPT="{{inputs.parameters.prompt}}"
            fi
            claude -p "$FULL_PROMPT" --dangerously-skip-permissions --output-format stream-json --verbose | tee /tmp/agent_output.json /work/last_agent_output.json
        env:
          - name: ANTHROPIC_BASE_URL
            value: "http://{{inputs.parameters.llm_gateway_host}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: agent-secrets
                key: CLAUDE_CODE_OAUTH_TOKEN
        volumeMounts:
          - name: workdir
            mountPath: /work

    - name: router
      inputs:
        parameters:
          - name: depth
          - name: max_depth
      outputs:
        parameters:
          - name: continue
            valueFrom:
              path: /tmp/continue.txt
      container:
        image: ghcr.io/dlddu/pure-agent/router:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            set -uo pipefail
            echo "[router-wrapper] Starting router" >&2
            echo "false" > /tmp/continue.txt

            if CONTINUE="$(python /app/router.py \
              --depth '{{inputs.parameters.depth}}' \
              --max-depth '{{inputs.parameters.max_depth}}')"; then
              echo "[router-wrapper] router.py succeeded" >&2
            else
              RC=$?
              echo "[router-wrapper] router.py exited with code ${RC}" >&2
              CONTINUE="false"
            fi

            echo "[router-wrapper] Captured CONTINUE='${CONTINUE}'" >&2
            if [ "${CONTINUE}" != "true" ]; then
              CONTINUE="false"
            fi
            echo "${CONTINUE}" > /tmp/continue.txt
            echo "[router-wrapper] /tmp/continue.txt='$(cat /tmp/continue.txt)'" >&2

            if [ "${CONTINUE}" != "true" ]; then
              cp /work/export_config.json /work/cycle_output.json 2>/dev/null || echo '{}' > /work/cycle_output.json
            fi
            echo "[router-wrapper] Done" >&2
        volumeMounts:
          - name: workdir
            mountPath: /work

    - name: export-cycle-output
      outputs:
        parameters:
          - name: cycle_output
            valueFrom:
              path: /tmp/cycle_output.json
      container:
        image: ghcr.io/dlddu/pure-agent/export-handler:latest
        command: ["node", "build/index.js"]
        env:
          - name: LINEAR_API_KEY
            valueFrom:
              secretKeyRef:
                name: export-handler-secrets
                key: LINEAR_API_KEY
          - name: LINEAR_TEAM_ID
            valueFrom:
              secretKeyRef:
                name: export-handler-secrets
                key: LINEAR_TEAM_ID
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: export-handler-secrets
                key: GITHUB_TOKEN
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # Cleanup
    # =============================
    - name: cleanup-job
      container:
        image: alpine:3.20
        command: ["/bin/sh", "-c"]
        args:
          - rm -rf /work/*
        volumeMounts:
          - name: workdir
            mountPath: /work
