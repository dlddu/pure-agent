# =============================================================================
# Pure-Agent Argo WorkflowTemplate
# =============================================================================
#
# 에이전트 실행 파이프라인 오케스트레이션:
#   1. 데몬 서비스 시작 (MCP Server, LLM Gateway)
#   2. Planner → Agent → Gate 재귀 루프 실행 (max_depth까지 반복)
#   3. Export Handler로 결과 내보내기
#   4. 공유 볼륨 정리
#
# Templates:
#   - main               : DAG 엔트리포인트
#   - mcp-daemon          : MCP Server 사이드카 (Linear 도구)
#   - llm-gateway-daemon  : nginx 리버스 프록시 → Anthropic API
#   - run-cycle           : Planner → Agent → Gate → Recurse 재귀 루프
#   - planner             : Claude Code CLI 기반 에이전트 실행 환경(이미지) 선택 (MCP 도구 접근 가능)
#   - agent-job           : Claude Code CLI 실행 (이미지 파라미터화)
#   - gate                : 계속/종료 판단
#   - export-cycle-output : 후처리 (Linear, GitHub, S3)
#   - cleanup-job         : 공유 볼륨 정리
#
# =============================================================================
apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: pure-agent
  namespace: pure-agent
spec:
  entrypoint: main
  serviceAccountName: argo-workflow-sa
  activeDeadlineSeconds: 7200

  arguments:
    parameters:
      - name: max_depth
        value: "10"
      - name: prompt
        value: ""

  volumeClaimTemplates:
    - metadata:
        name: workdir
      spec:
        accessModes: ["ReadWriteMany"]
        storageClassName: efs
        resources:
          requests:
            storage: 10Gi

  outputs:
    parameters:
      - name: export_config
        valueFrom:
          parameter: "{{tasks.export-cycle-output.outputs.parameters.export_config}}"
      - name: action_results
        valueFrom:
          parameter: "{{tasks.export-cycle-output.outputs.parameters.action_results}}"

  templates:

    # =============================
    # Main DAG
    # =============================
    - name: main
      dag:
        tasks:
          - name: mcp-daemon
            template: mcp-daemon

          - name: llm-gateway-daemon
            template: llm-gateway-daemon

          - name: run-cycle
            template: run-cycle
            dependencies: [mcp-daemon, llm-gateway-daemon]
            continueOn:
              failed: true
              error: true
            arguments:
              parameters:
                - name: depth
                  value: "0"
                - name: max_depth
                  value: "{{workflow.parameters.max_depth}}"
                - name: prompt
                  value: "{{workflow.parameters.prompt}}"
                - name: previous_output
                  value: ""
                - name: mcp_host
                  value: "{{tasks.mcp-daemon.ip}}"
                - name: llm_gateway_host
                  value: "{{tasks.llm-gateway-daemon.ip}}"

          - name: export-cycle-output
            template: export-cycle-output
            dependencies: [run-cycle]
            continueOn:
              failed: true

          - name: cleanup
            template: cleanup-job
            dependencies: [export-cycle-output]

    # =============================
    # MCP Server Daemon
    # =============================
    - name: mcp-daemon
      daemon: true
      metadata:
        labels:
          pure-agent/role: mcp-server
      container:
        image: ghcr.io/dlddu/pure-agent/mcp-server:latest
        command: ["node", "build/index.js"]
        ports:
          - containerPort: 8080
        env:
          - name: LINEAR_API_KEY
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: LINEAR_API_KEY
          - name: LINEAR_TEAM_ID
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: LINEAR_TEAM_ID
          - name: GATEKEEPER_URL
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: GATEKEEPER_URL
          - name: GATEKEEPER_API_KEY
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: GATEKEEPER_API_KEY
          - name: GATEKEEPER_USER_ID
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: GATEKEEPER_USER_ID
          - name: AWS_S3_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: AWS_S3_BUCKET_NAME
          - name: AWS_ASSUME_ROLE_ARN
            valueFrom:
              secretKeyRef:
                name: mcp-server-secrets
                key: AWS_ASSUME_ROLE_ARN
                optional: true
          - name: AWS_REGION
            value: "ap-northeast-2"
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # LLM Gateway Daemon
    # =============================
    - name: llm-gateway-daemon
      daemon: true
      metadata:
        labels:
          pure-agent/role: llm-gateway
      volumes:
        - name: llm-gateway-config
          configMap:
            name: llm-gateway-config
      container:
        image: nginx:alpine
        ports:
          - containerPort: 80
            name: http
            protocol: TCP
        volumeMounts:
          - name: llm-gateway-config
            mountPath: /etc/nginx/conf.d/default.conf
            subPath: default.conf
            readOnly: true
        livenessProbe:
          tcpSocket:
            port: 80
          periodSeconds: 10
          failureThreshold: 3

    # =============================
    # Planner → Agent → Gate Loop
    # =============================
    - name: run-cycle
      inputs:
        parameters:
          - name: depth
          - name: max_depth
          - name: prompt
          - name: previous_output
          - name: mcp_host
          - name: llm_gateway_host
      steps:
        - - name: planner
            template: planner
            arguments:
              parameters:
                - name: prompt
                  value: "{{inputs.parameters.prompt}}"
                - name: llm_gateway_host
                  value: "{{inputs.parameters.llm_gateway_host}}"
                - name: mcp_host
                  value: "{{inputs.parameters.mcp_host}}"
        - - name: agent
            template: agent-job
            arguments:
              parameters:
                - name: prompt
                  value: "{{inputs.parameters.prompt}}"
                - name: previous_output
                  value: "{{inputs.parameters.previous_output}}"
                - name: llm_gateway_host
                  value: "{{inputs.parameters.llm_gateway_host}}"
                - name: mcp_host
                  value: "{{inputs.parameters.mcp_host}}"
                - name: agent_image
                  value: "{{steps.planner.outputs.parameters.agent_image}}"
                # Grant cluster-wide read-only RBAC only when the planner
                # selected the infra environment; all other agents fall
                # back to the namespace-scoped argo-workflow-sa.
                - name: service_account
                  value: "{{= steps.planner.outputs.parameters.raw_environment_id == 'infra' ? 'infra-agent-sa' : 'argo-workflow-sa' }}"
        - - name: gate
            template: gate
            arguments:
              parameters:
                - name: depth
                  value: "{{inputs.parameters.depth}}"
                - name: max_depth
                  value: "{{inputs.parameters.max_depth}}"
                - name: export_config
                  value: "{{steps.agent.outputs.parameters.export_config}}"
        - - name: recurse
            template: run-cycle
            when: "{{steps.gate.outputs.parameters.continue}} == true"
            arguments:
              parameters:
                - name: depth
                  value: "{{=asInt(inputs.parameters.depth)+1}}"
                - name: max_depth
                  value: "{{inputs.parameters.max_depth}}"
                - name: prompt
                  value: "{{inputs.parameters.prompt}}"
                - name: previous_output
                  value: "{{steps.agent.outputs.parameters.result}}"
                - name: mcp_host
                  value: "{{inputs.parameters.mcp_host}}"
                - name: llm_gateway_host
                  value: "{{inputs.parameters.llm_gateway_host}}"

    # =============================
    # Planner (image selection)
    # =============================
    - name: planner
      metadata:
        labels:
          pure-agent/role: planner
      inputs:
        parameters:
          - name: prompt
          - name: llm_gateway_host
          - name: mcp_host
      outputs:
        parameters:
          - name: agent_image
            valueFrom:
              path: /tmp/agent_image.txt
          - name: raw_environment_id
            valueFrom:
              path: /tmp/raw_environment_id.txt
          - name: session_id
            valueFrom:
              path: /tmp/session_id.txt
              default: ""
          - name: planner_debug
            valueFrom:
              path: /tmp/planner_debug.log
              default: "(no debug log)"
      container:
        image: ghcr.io/dlddu/pure-agent/planner:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            planner \
              --prompt "$PROMPT" \
              --output /tmp/agent_image.txt \
              --raw-id-output /tmp/raw_environment_id.txt \
              2>/tmp/planner_debug.log \
            || {
              rc=$?
              echo "[planner-fallback] planner CLI failed (exit=$rc), using default image" >> /tmp/planner_debug.log
              echo "ghcr.io/dlddu/pure-agent/claude-agent:latest" > /tmp/agent_image.txt
              echo "FALLBACK:exit=$rc" > /tmp/raw_environment_id.txt
            }
        env:
          - name: PROMPT
            value: "{{inputs.parameters.prompt}}"
          - name: MCP_HOST
            value: "{{inputs.parameters.mcp_host}}"
          - name: ANTHROPIC_BASE_URL
            value: "http://{{inputs.parameters.llm_gateway_host}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: planner-secrets
                key: CLAUDE_CODE_OAUTH_TOKEN
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # Agent Job
    # =============================
    - name: agent-job
      serviceAccountName: "{{inputs.parameters.service_account}}"
      metadata:
        labels:
          pure-agent/role: agent
      inputs:
        parameters:
          - name: prompt
          - name: previous_output
          - name: llm_gateway_host
          - name: mcp_host
          - name: agent_image
          - name: service_account
            default: argo-workflow-sa
      outputs:
        parameters:
          - name: result
            valueFrom:
              path: /tmp/agent_result.txt
          - name: session_id
            valueFrom:
              path: /tmp/session_id.txt
          - name: export_config
            valueFrom:
              path: /work/export_config.json
              default: "{}"
      nodeSelector:
        node.kubernetes.io/lifecycle: on-demand
      tolerations:
        - key: "lifecycle"
          operator: "Equal"
          value: "on-demand"
          effect: "NoSchedule"
      container:
        image: "{{inputs.parameters.agent_image}}"
        command: ["/home/claude/entrypoint.sh"]
        resources:
          requests:
            memory: 1600Mi
          limits:
            memory: 1600Mi
        env:
          - name: PROMPT
            value: "{{inputs.parameters.prompt}}"
          - name: PREVIOUS_OUTPUT
            value: "{{inputs.parameters.previous_output}}"
          - name: MCP_HOST
            value: "{{inputs.parameters.mcp_host}}"
          - name: ANTHROPIC_BASE_URL
            value: "http://{{inputs.parameters.llm_gateway_host}}"
          - name: CLAUDE_CODE_OAUTH_TOKEN
            valueFrom:
              secretKeyRef:
                name: agent-secrets
                key: CLAUDE_CODE_OAUTH_TOKEN
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # Gate (continue/stop decision)
    # =============================
    - name: gate
      inputs:
        parameters:
          - name: depth
          - name: max_depth
          - name: export_config
      outputs:
        parameters:
          - name: continue
            valueFrom:
              path: /tmp/continue.txt
      container:
        image: ghcr.io/dlddu/pure-agent/gate:latest
        command: ["/bin/sh", "-c"]
        args:
          - |
            gate \
              --export-config "$EXPORT_CONFIG_JSON" \
              --depth '{{inputs.parameters.depth}}' \
              --max-depth '{{inputs.parameters.max_depth}}' \
              --output /tmp/continue.txt \
            || echo "false" > /tmp/continue.txt
        env:
          - name: EXPORT_CONFIG_JSON
            value: "{{inputs.parameters.export_config}}"
          - name: AWS_S3_BUCKET_NAME
            valueFrom:
              secretKeyRef:
                name: gate-secrets
                key: AWS_S3_BUCKET_NAME
          - name: AWS_ASSUME_ROLE_ARN
            valueFrom:
              secretKeyRef:
                name: gate-secrets
                key: AWS_ASSUME_ROLE_ARN
                optional: true
          - name: AWS_S3_PREFIX
            valueFrom:
              secretKeyRef:
                name: gate-secrets
                key: AWS_S3_PREFIX
                optional: true
          - name: AWS_REGION
            value: "ap-northeast-2"
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # Export Cycle Output
    # =============================
    - name: export-cycle-output
      outputs:
        parameters:
          - name: export_config
            valueFrom:
              path: /tmp/export_config.json
          - name: action_results
            valueFrom:
              path: /tmp/action_results.json
              default: "{}"
      container:
        image: ghcr.io/dlddu/pure-agent/export-handler:latest
        command: ["node", "build/index.js"]
        env:
          - name: LINEAR_API_KEY
            valueFrom:
              secretKeyRef:
                name: export-handler-secrets
                key: LINEAR_API_KEY
          - name: GITHUB_TOKEN
            valueFrom:
              secretKeyRef:
                name: export-handler-secrets
                key: GITHUB_TOKEN
        volumeMounts:
          - name: workdir
            mountPath: /work

    # =============================
    # Cleanup
    # =============================
    - name: cleanup-job
      outputs:
        parameters:
          - name: file_list
            valueFrom:
              path: /tmp/file_list.txt
      container:
        image: alpine:3.20
        command: ["/bin/sh", "-c"]
        args:
          - find /work -maxdepth 1 | tee /tmp/file_list.txt && find /work -mindepth 1 -delete
        volumeMounts:
          - name: workdir
            mountPath: /work
